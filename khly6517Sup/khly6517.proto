##################################################
#
# Protocol file for Keithley 6517B
#
##################################################

Terminator = CR LF;

getMode {
    out "FUNC?";
    in "%s";
}

setMode {
    out "FUNC '%s'";
}

getRead {
    out "READ?";
    in "%s";
}

getRangCurr {
    out "CURR:DC:RANGE?";
    in "%s";
}  

getRangVolt {
    out "VOLT:DC:RANGE?";
    in "%s";
}  

setRangCurr {
    out "CURR:DC:RANG %f";
}

setRangVolt {
    out "VOLT:DC:RANG %f";
}

getErr {
    out ":SYST:ERR?";
    in "%f";
}

getQue {
    out ":STAT:QUE?";
    in "%f";
}

clearQue {
    out "*CLS";
}

setVoltage {
    out "FUNC VOLT"
}

setCurrent {
    out "FUNC CURR"
}

getZeroCheck {
    out ":SYST:ZCH?";
	in "%#{OFF=0|0=0|ON=1|1=1}";
}

setZeroCheck {
    out ":SYST:ZCH %{OFF|ON}";
}

getCurrAutorange {
    out ":SENS:CURR:RANG:AUTO?";
	in "%#{OFF=0|0=0|ON=1|1=1}";
}

setCurrAutorange {
    out ":SENS:CURR:RANG:AUTO %{OFF|ON}";
}
